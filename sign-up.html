<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07060D">
<title>Create Account | E4LA</title>
<meta name="description" content="E4LA client portal authentication.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css?v=2026072011">
<link rel="icon" type="image/png" href="assets/e4la-logo-palm.png?v=2026071916">
<link rel="apple-touch-icon" href="assets/e4la-logo-palm.png?v=2026071916">
</head>
<body class="auth-page auth-page--signup">
<main class="auth-shell" id="main">
<section class="auth-brand" aria-label="E4LA client portal introduction">

<div class="auth-media" aria-hidden="true">
<video class="auth-media__video" src="assets/auth-robot-alpha.webm?v=2026072005" autoplay muted loop playsinline preload="auto"></video>
</div>
</section>
<section class="auth-card" aria-label="Create Account">
<a class="auth-card__close" href="index.html#main" aria-label="Close and return home">&times;</a>
<p class="auth-eyebrow">JOIN E4LA</p>
<h1>Create your account</h1>
<p class="auth-card__copy">Manage your bookings and access your E4LA resources.</p>
<form class="auth-form" data-auth-form="sign-up" novalidate>
<div class="auth-alert" role="alert" aria-live="polite"></div>
<div class="auth-field"><label for="signup-name">Full name</label><input class="auth-input" id="signup-name" name="fullName" type="text" autocomplete="name" required><p class="auth-error"></p></div>
<div class="auth-field"><label for="signup-email">Email address</label><input class="auth-input" id="signup-email" name="email" type="email" autocomplete="email" required><p class="auth-error"></p></div>
<div class="auth-field"><label for="signup-password">Password</label><div class="auth-input-wrap"><input id="signup-password" name="password" type="password" autocomplete="new-password" required><button class="auth-password-toggle" type="button" data-password-toggle aria-controls="signup-password" aria-label="Show password">Show</button></div><p class="auth-password-help" data-password-help>Use at least 8 characters. A real provider can enforce stronger rules.</p><p class="auth-error"></p></div>
<div class="auth-field"><label for="signup-confirm">Confirm password</label><div class="auth-input-wrap"><input id="signup-confirm" name="confirmPassword" type="password" autocomplete="new-password" required><button class="auth-password-toggle" type="button" data-password-toggle aria-controls="signup-confirm" aria-label="Show password">Show</button></div><p class="auth-error"></p></div>
<div class="auth-field"><label class="auth-check"><input type="checkbox" name="terms" required><span>I agree to the <a class="auth-link" href="#">Terms of Service</a> and <a class="auth-link" href="#">Privacy Policy</a>.</span></label><p class="auth-error"></p></div>
<button class="auth-primary" type="submit">CREATE ACCOUNT</button>
<div class="auth-divider"><span>or continue with</span></div>
<div class="auth-social-grid" aria-label="Social authentication options"><button class="auth-provider" type="button" data-provider-auth="google"><span class="auth-provider__mark" aria-hidden="true"><svg class="auth-provider__icon auth-provider__icon--google" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg></span><span>Continue with Google</span></button><button class="auth-provider" type="button" data-provider-auth="apple"><span class="auth-provider__mark" aria-hidden="true"><svg class="auth-provider__icon auth-provider__icon--apple" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M16.37 1.43c0 1.02-.42 2.02-1.1 2.77-.72.8-1.9 1.42-2.86 1.34-.13-.98.37-2.03 1.04-2.74.74-.79 2.02-1.38 2.92-1.37zM20.72 17.24c-.45 1.04-.67 1.5-1.25 2.42-.8 1.24-1.92 2.79-3.31 2.8-1.24.01-1.56-.81-3.24-.8-1.68 0-2.03.81-3.27.8-1.39-.01-2.45-1.42-3.25-2.66-2.22-3.44-2.45-7.48-1.08-9.63.98-1.53 2.52-2.43 3.97-2.43 1.47 0 2.4.81 3.62.81 1.18 0 1.9-.81 3.6-.81 1.29 0 2.65.7 3.62 1.91-3.18 1.74-2.66 6.28.59 7.59z"/></svg></span><span>Continue with Apple</span></button></div>
<p class="auth-switch">Already have an account? <a class="auth-link" href="sign-in.html">Sign in</a></p>
</form>
</section>
</main>
<script src="auth.js?v=2026072006" defer></script>
<script type="module" src="motion.js?v=2026072006"></script>
</body>
</html>
